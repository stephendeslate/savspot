name: Reset Demo Tenant

on:
  schedule:
    - cron: '17 6 * * *' # 6:17 UTC daily
  workflow_dispatch: # manual trigger

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @savspot/shared build

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Start Fly proxy
        run: |
          flyctl proxy 15432:5432 -a savspot-db &
          sleep 3
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Reset demo tenant
        run: pnpm exec tsx scripts/admin/reset-demo.ts
        env:
          DATABASE_URL: postgres://postgres:${{ secrets.FLY_PG_PASSWORD }}@localhost:15432/savspot?sslmode=disable
