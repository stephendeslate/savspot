name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://savspot:savspot_dev@localhost:5432/savspot_test

jobs:
  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FAILED=0
          for SHA in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            MSG=$(git log -1 --format='%B' "$SHA")
            AUTHOR=$(git log -1 --format='%aN <%aE>' "$SHA")
            if ! echo "$MSG" | grep -qiF "Signed-off-by: $AUTHOR"; then
              echo "::error::Commit $SHA by $AUTHOR is missing DCO sign-off"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more commits are missing a DCO Signed-off-by line."
            echo "Fix with: git commit --amend -s"
            exit 1
          fi
          echo "All commits have valid DCO sign-off."

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - run: pnpm db:generate
      - run: pnpm lint
      - run: pnpm typecheck
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: savspot
          POSTGRES_PASSWORD: savspot_dev
          POSTGRES_DB: savspot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    needs: [lint-typecheck, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: savspot
          POSTGRES_PASSWORD: savspot_dev
          POSTGRES_DB: savspot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm db:seed
      - run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_API_URL: http://localhost:3001
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run E2E Tests
        run: pnpm test:e2e
        working-directory: apps/web
        env:
          REDIS_URL: redis://localhost:6379
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
