name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "prisma/**"
      - "pnpm-lock.yaml"

# Prevent concurrent deploys
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve failed migration (one-time cleanup)
        run: |
          flyctl ssh console --config apps/api/fly.toml -C \
            "/bin/sh -c '/app/prisma/node_modules/.bin/prisma migrate resolve --rolled-back 20260311000000_add_phase4_rls_and_cascades --schema /app/prisma/schema.prisma'" \
            || echo "No failed migration to resolve (or already resolved)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy API
        run: flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker to Fly.io
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Worker
        run: flyctl deploy --config apps/api/fly.worker.toml --dockerfile apps/api/Dockerfile.worker --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
